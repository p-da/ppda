<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Logo Loader</title>

<style>

body{
background:#1b6d4f;
display:flex;
justify-content:center;
align-items:center;
height:100vh; /* ketinggian logo dari bawah */
margin:0;
}

.logo{
width:100px;
}

/* garis berjalan */

.logo path{

fill:none;
stroke:#fcf7f0;  /* garis cream */
stroke-width:.5;

stroke-linecap:round;
stroke-linejoin:round;

/* panjang garis sama */

stroke-dasharray:60 65;

/* posisi awal */

stroke-dashoffset:0;

/* animasi loop */

animation:moveLine 2s linear infinite;

}

/* animasi garis berjalan */

@keyframes moveLine{

from{
stroke-dashoffset:0;
}

to{
stroke-dashoffset:-120;
}

}

.loading{
color:#fcf7f0;
font-family:sans-serif;
font-size:12px;
letter-spacing:4px;
margin-top:22px;
text-align:center;
animation:blink 2s linear infinite;
}

@keyframes blink{

0%,100%{opacity:.35}
50%{opacity:1}

}

</style>
</head>
