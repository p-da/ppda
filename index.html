<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darul Abror • Loading</title>
    
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fcf7f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            color: #2d3e3a;
        }

        .loader {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }

        /* Logo container */
        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2.5rem;
        }

        .logo {
            width: 100%;
            height: 100%;
            animation: float 3s ease-in-out infinite;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(27, 77, 62, 0.15));
        }

        /* Brand text */
        .brand {
            margin-bottom: 2.5rem;
        }

        .brand-super {
            font-size: 0.4rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #9aa9a4;
            margin-bottom: 0.25rem;
        }

        .brand-main {
            font-size: 1.4rem;
            font-weight: 500;
            color: #1B4D3E;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        /* Minimalist square dots loader */
        .dots-loader {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 2rem;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: #1B4D3E;
            opacity: 0.2;
            animation: minimalistPulse 1.2s ease-in-out infinite;
        }

        .dot:nth-child(1) {
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes minimalistPulse {
            0%, 100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Delayed animations */
        .logo-container { animation-delay: 0.1s; }
        .brand { animation-delay: 0.3s; }
        .dots-loader { animation-delay: 0.5s; }

        /* Floating animation for logo */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-container {
                width: 120px;
                height: 120px;
            }
            
            .brand-main {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .logo-container {
                width: 100px;
                height: 100px;
                margin-bottom: 2rem;
            }
            
            .brand-super {
                font-size: 0.65rem;
                letter-spacing: 1.5px;
            }
            
            .brand-main {
                font-size: 1.1rem;
            }
            
            .dot {
                width: 3px;
                height: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="loader">
        <!-- Logo -->
        <div class="logo-container fade-in">
            <div class="logo">
                <img src="logoda.png" alt="Darul Abror" onerror="this.src='https://placehold.co/400x400/1B4D3E/FFFFFF?text=DA'">
            </div>
        </div>
        
        <!-- Brand text - fixed hierarchy -->
        <div class="brand fade-in">
            <div class="brand-super">YAYASAN PONDOK PESANTREN</div>
            <div class="brand-main">Darul Abror</div>
        </div>
        
        <!-- Minimalist square dots loader -->
        <div class="dots-loader fade-in">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        (function() {
            const redirectUrl = "https://quiet-bubblegum-53d1b5.netlify.app/";
            const delay = 2500;
            
            // Pre-connect to target domain
            const preconnect = document.createElement('link');
            preconnect.rel = 'preconnect';
            preconnect.href = new URL(redirectUrl).origin;
            document.head.appendChild(preconnect);
            
            // Set redirect
            setTimeout(function() {
                window.location.href = redirectUrl;
            }, delay);
            
            // Fallback logo
            const logoImg = document.querySelector('.logo img');
            logoImg.addEventListener('error', function() {
                this.src = 'https://placehold.co/400x400/1B4D3E/FFFFFF?text=DA';
                this.style.background = 'transparent';
            });
            logoImg.style.background = 'transparent';
        })();
    </script>
</body>
</html>
