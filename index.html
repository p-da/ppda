<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darul Abror</title>
    <meta http-equiv="refresh" content="1.5; url=https://quiet-bubblegum-53d1b5.netlify.app/">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .splash {
            text-align: center;
            padding: 20px;
        }

        /* Container untuk logo dan loading */
        .logo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Logo */
        .logo-img {
            width: 70px;
            height: auto;
            position: relative;
            z-index: 2;
            display: block;
        }

        /* Loading bulat di belakang logo */
        .loading-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid #e0e5e3;
            border-top-color: #1a3b34;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 1;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Link kecil di bawah */
        .direct-link {
            color: #a0b4ae;
            text-decoration: none;
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 25px;
            border-bottom: 1px solid #e0e5e3;
            padding-bottom: 2px;
        }

        .direct-link:hover {
            color: #1a3b34;
            border-bottom-color: #1a3b34;
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="logo-wrapper">
            <div class="loading-circle"></div>
            <img src="logoda.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        </div>
        
        <a href="https://quiet-bubblegum-53d1b5.netlify.app/" class="direct-link">Darul Abror</a>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = "https://quiet-bubblegum-53d1b5.netlify.app/";
        }, 1700);
    </script>
</body>
</html>
